# .github/workflows/deploy.yml
# Automatically builds and deploys to Firebase Hosting on every push to main.
#
# Setup:
#   1. Run: firebase init hosting  (choose "build" as public directory, SPA=yes)
#   2. Go to GitHub repo → Settings → Secrets → Actions
#   3. Add secret: FIREBASE_SERVICE_ACCOUNT  (value from Firebase Console → Service Accounts → Generate key)
#   4. Add all REACT_APP_* env vars as GitHub Secrets too

name: Build & Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          REACT_APP_FIREBASE_API_KEY:            ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN:        ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID:         ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET:     ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID:             ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID:     ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
          REACT_APP_FIREBASE_VAPID_KEY:          ${{ secrets.REACT_APP_FIREBASE_VAPID_KEY }}
        run: npm run build

      - name: Deploy to Firebase Hosting (Preview on PR)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase Hosting (Live on main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
